services:
  postgres:
    image: postgres:16-alpine
    container_name: iizr-tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iizr_tools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: